services:
  mongodb:
    image: mongo:7
    container_name: singravox-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: singravox-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "${DB_NAME:-singravox}"
      JWT_SECRET: "${JWT_SECRET}"
      COOKIE_SECURE: "true"
      FRONTEND_URL: "https://${DOMAIN}"
      CORS_ORIGINS: "https://${DOMAIN},tauri://localhost,http://tauri.localhost"
      LIVEKIT_URL: "wss://${RTC_DOMAIN}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
    container_name: singravox-web
    restart: unless-stopped
    depends_on:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    container_name: singravox-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  coturn:
    image: coturn/coturn:latest
    container_name: singravox-coturn
    restart: unless-stopped
    profiles: ["turn"]
    command: ["-c", "/etc/coturn/turnserver.conf", "--no-cli"]
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro

  caddy:
    image: caddy:2-alpine
    container_name: singravox-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
      RTC_DOMAIN: "${RTC_DOMAIN}"
    depends_on:
      - backend
      - frontend
      - livekit

volumes:
  mongo_data:
  caddy_data:
  caddy_config:

