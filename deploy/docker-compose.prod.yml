services:
  mongodb:
    image: mongo:7
    container_name: singravox-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: singravox-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "${DB_NAME:-singravox}"
      JWT_SECRET: "${JWT_SECRET}"
      COOKIE_SECURE: "true"
      FRONTEND_URL: "https://${DOMAIN}"
      CORS_ORIGINS: "https://${DOMAIN},tauri://localhost,http://tauri.localhost"
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_PUBLIC_URL: "wss://${RTC_DOMAIN}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      S3_BUCKET: "${S3_BUCKET:-singravox-e2ee}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
    container_name: singravox-web
    restart: unless-stopped
    depends_on:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    container_name: singravox-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  coturn:
    image: coturn/coturn:latest
    container_name: singravox-coturn
    restart: unless-stopped
    profiles: ["turn"]
    command: ["-c", "/etc/coturn/turnserver.conf", "--no-cli"]
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro

  minio:
    image: minio/minio:latest
    container_name: singravox-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_KEY}"
    volumes:
      - minio_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: singravox-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
      RTC_DOMAIN: "${RTC_DOMAIN}"
    depends_on:
      - backend
      - frontend
      - livekit

volumes:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
