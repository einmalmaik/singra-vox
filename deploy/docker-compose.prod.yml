services:
  mongodb:
    image: mongo:7
    container_name: singravox-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: singravox-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "${DB_NAME:-singravox}"
      JWT_SECRET: "${JWT_SECRET}"
      COOKIE_SECURE: "true"
      FRONTEND_URL: "https://${DOMAIN}"
      CORS_ORIGINS: "https://${DOMAIN},tauri://localhost,http://tauri.localhost"
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_PUBLIC_URL: "wss://${RTC_DOMAIN}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      S3_BUCKET: "${S3_BUCKET:-singravox-e2ee}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      SMTP_HOST: "${SMTP_HOST:-mailpit}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-no-reply@singravox.local}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Singra Vox}"
      SMTP_USE_TLS: "${SMTP_USE_TLS:-false}"
      SMTP_USE_SSL: "${SMTP_USE_SSL:-false}"
      EMAIL_VERIFICATION_TTL_MINUTES: "${EMAIL_VERIFICATION_TTL_MINUTES:-15}"
      PASSWORD_RESET_TTL_MINUTES: "${PASSWORD_RESET_TTL_MINUTES:-15}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_EMAIL: "${VAPID_EMAIL:-}"
      INSTANCE_ENCRYPTION_SECRET: "${INSTANCE_ENCRYPTION_SECRET}"
      SVID_ISSUER: "${SVID_ISSUER:-https://voxid.mauntingstudios.de}"
      SVID_JWT_SECRET: "${SVID_JWT_SECRET:-}"
      MAX_E2EE_BLOB_BYTES: "${MAX_E2EE_BLOB_BYTES:-52428800}"
    volumes:
      - uploads_data:/app/storage/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
    container_name: singravox-web
    restart: unless-stopped
    depends_on:
      - backend

  livekit:
    image: livekit/livekit-server:latest
    container_name: singravox-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  coturn:
    image: coturn/coturn:latest
    container_name: singravox-coturn
    restart: unless-stopped
    profiles: ["turn"]
    command: ["-c", "/etc/coturn/turnserver.conf", "--no-cli"]
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro

  minio:
    image: minio/minio:latest
    container_name: singravox-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_KEY}"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: singravox-mailpit
    restart: unless-stopped
    profiles: ["dev"]

  caddy:
    image: caddy:2-alpine
    container_name: singravox-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
      RTC_DOMAIN: "${RTC_DOMAIN}"
    depends_on:
      - backend
      - frontend
      - livekit

volumes:
  mongo_data:
  minio_data:
  uploads_data:
  caddy_data:
  caddy_config:
