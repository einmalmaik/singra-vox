# Replace `chat.example.com` and `rtc.example.com` with your real domains.

server {
    listen 80;
    server_name chat.example.com;

    client_max_body_size 20M;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/ {
        set $backend_upstream http://backend:8001;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name rtc.example.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / {
        set $livekit_upstream http://livekit:7880;
        proxy_pass $livekit_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
