services:
  mongodb:
    image: mongo:7
    container_name: singravox-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: singravox-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "${DB_NAME:-singravox}"
      JWT_SECRET: "${JWT_SECRET}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:8080}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080,http://localhost:3000,http://127.0.0.1:3000,tauri://localhost,http://tauri.localhost}"
      LIVEKIT_URL: "${LIVEKIT_URL:-ws://localhost:7880}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secret}"
      SMTP_HOST: "${SMTP_HOST:-mailpit}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-no-reply@singravox.local}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Singra Vox}"
      SMTP_USE_TLS: "${SMTP_USE_TLS:-false}"
      SMTP_USE_SSL: "${SMTP_USE_SSL:-false}"
      EMAIL_VERIFICATION_TTL_MINUTES: "${EMAIL_VERIFICATION_TTL_MINUTES:-15}"
      PASSWORD_RESET_TTL_MINUTES: "${PASSWORD_RESET_TTL_MINUTES:-15}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    container_name: singravox-mailpit
    restart: unless-stopped
    ports:
      - "${MAIL_UI_PORT:-8025}:8025"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
    container_name: singravox-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  livekit:
    image: livekit/livekit-server:latest
    container_name: singravox-livekit
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  coturn:
    image: coturn/coturn:latest
    container_name: singravox-coturn
    restart: unless-stopped
    profiles: ["turn"]
    command: ["-c", "/etc/coturn/turnserver.conf", "--no-cli"]
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro

  proxy:
    image: nginx:1.25-alpine
    container_name: singravox-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
    driver: local
