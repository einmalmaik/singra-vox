# ╔══════════════════════════════════════════════════════╗
# ║  Singra Vox – Docker Compose (Development / Small)  ║
# ╚══════════════════════════════════════════════════════╝
#
# Usage:
#   cp .env.example .env    # edit values
#   docker compose up -d    # start
#   docker compose logs -f  # watch logs

services:
  # ── MongoDB ──
  mongodb:
    image: mongo:7
    container_name: singravox-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: singravox-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "${DB_NAME:-singravox}"
      JWT_SECRET: "${JWT_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@singravox.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend Web Client ──
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
      args:
        REACT_APP_BACKEND_URL: "${BACKEND_PUBLIC_URL:-http://localhost:8080}"
    container_name: singravox-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── Reverse Proxy (routes /api → backend, / → frontend) ──
  proxy:
    image: nginx:1.25-alpine
    container_name: singravox-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
    driver: local
