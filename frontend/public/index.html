<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0a0a0a" />
        <meta name="description" content="Singra Vox is a self-hosted server, chat, voice, and private communication platform." />
        <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Singra Vox</title>
        <style>
          #splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0a0a0a;transition:opacity .4s ease}
          #splash.hide{opacity:0;pointer-events:none}
          #splash-inner{display:flex;flex-direction:column;align-items:center;gap:18px}
          #splash-fox{width:72px;height:72px;animation:foxIn .6s cubic-bezier(.16,1,.3,1) both}
          #splash-name{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:18px;letter-spacing:.06em;color:#a1a1aa;opacity:0;animation:fadeUp .5s .3s ease both}
          #splash-bar{width:120px;height:3px;border-radius:99px;background:#27272a;overflow:hidden;opacity:0;animation:fadeUp .4s .5s ease both}
          #splash-bar-fill{width:0;height:100%;border-radius:99px;background:linear-gradient(90deg,#06b6d4,#22d3ee);animation:barGrow 1.2s .6s cubic-bezier(.4,0,.2,1) both}
          @keyframes foxIn{0%{opacity:0;transform:scale(.6) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
          @keyframes fadeUp{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
          @keyframes barGrow{0%{width:0}60%{width:80%}100%{width:100%}}
        </style>
    </head>
    <body>
        <div id="splash">
          <div id="splash-inner">
            <img id="splash-fox" src="%PUBLIC_URL%/favicon-192x192.png" alt="" />
            <div id="splash-name">SINGRA VOX</div>
            <div id="splash-bar"><div id="splash-bar-fill"></div></div>
          </div>
        </div>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
          // Splash ausblenden sobald React gemountet hat
          var _ro = new MutationObserver(function(m){
            if(document.getElementById('root').childElementCount > 0){
              var s=document.getElementById('splash');
              if(s){s.classList.add('hide');setTimeout(function(){s.remove()},500)}
              _ro.disconnect();
            }
          });
          _ro.observe(document.getElementById('root'),{childList:true});
          // Fallback: nach 5s trotzdem ausblenden
          setTimeout(function(){var s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(function(){s.remove()},500)}},5000);
        </script>
    </body>
</html>
