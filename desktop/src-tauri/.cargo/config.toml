# The Windows LiveKit/WebRTC dependency tree exceeds MAX_PATH under the
# default `desktop/src-tauri/target` location. A very short shared target dir
# keeps direct `cargo` and `tauri` invocations reproducible without relying on
# wrapper scripts.
[build]
target-dir = "../../t"

# LiveKit's Windows WebRTC artifacts are built against the static MSVC runtime.
# Matching that runtime here avoids linker conflicts when the native desktop
# publisher is linked into the Tauri binary.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
