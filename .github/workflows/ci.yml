name: Singra Vox CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: pip install ruff && ruff check .

      - name: Type check (mypy)
        run: pip install mypy && mypy server.py --ignore-missing-imports || true

  # ── Frontend ──
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn eslint src/ --max-warnings 0 || true

      - name: Build
        env:
          REACT_APP_BACKEND_URL: "https://placeholder.example.com"
        run: yarn build

  # ── Docker Build ──
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -f deploy/backend.Dockerfile -t singravox-backend:test backend/

      - name: Build Frontend Image
        run: |
          docker build \
            -f deploy/frontend.Dockerfile \
            --build-arg REACT_APP_BACKEND_URL=https://placeholder.example.com \
            -t singravox-web:test \
            frontend/

  # ── Docker Push (only on main) ──
  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: deploy/backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: deploy/frontend.Dockerfile
          push: true
          build-args: REACT_APP_BACKEND_URL=
          tags: ghcr.io/${{ github.repository }}/web:latest
