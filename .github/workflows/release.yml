name: Singra Vox Release

# Wird ausgelöst wenn ein Tag wie v1.0.0 gepusht wird
# Beispiel:  git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Desktop-Apps bauen (Windows, Linux, macOS) ────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workdir: desktop/src-tauri

      - name: Linux-Systemabhängigkeiten
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            pkg-config

      - name: Frontend-Abhängigkeiten installieren
        run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Desktop-Abhängigkeiten installieren
        run: yarn install --frozen-lockfile
        working-directory: desktop

      - name: Linux rustc-Workaround setzen
        if: matrix.os == 'ubuntu-22.04'
        run: echo "RUSTFLAGS=--cap-lints allow" >> $GITHUB_ENV

      # Version automatisch aus Git-Tag setzen (v0.1.3 → 0.1.3)
      - name: Version aus Tag setzen
        shell: python3 {0}
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          import json, re, os, sys

          raw = os.environ.get("TAG_NAME", "").strip()
          version = raw.lstrip("v")

          # Semver validieren (MAJOR.MINOR.PATCH, optional prerelease)
          if not re.match(r'^\d+\.\d+\.\d+', version):
              print(f"FEHLER: '{raw}' ist kein gueltiger semver-Tag (erwartet: vMAJOR.MINOR.PATCH)")
              sys.exit(1)

          print(f"Setze Version: {version}")

          # tauri.conf.json
          with open("desktop/src-tauri/tauri.conf.json") as f:
              c = json.load(f)
          c["version"] = version
          with open("desktop/src-tauri/tauri.conf.json", "w") as f:
              json.dump(c, f, indent=4)
              f.write("\n")
          print("tauri.conf.json:", c["version"])

          # Cargo.toml (nur erste version-Zeile im [package]-Block)
          with open("desktop/src-tauri/Cargo.toml") as f:
              content = f.read()
          content = re.sub(
              r'^version = "[^"]+"',
              f'version = "{version}"',
              content, count=1, flags=re.MULTILINE
          )
          with open("desktop/src-tauri/Cargo.toml", "w") as f:
              f.write(content)
          m = re.search(r'^version = "([^"]+)"', content, re.MULTILINE)
          print("Cargo.toml:", m.group(1) if m else "NOT FOUND")

      - name: Tauri-Signing-Key normalisieren
        shell: python3 {0}
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          import base64
          import binascii
          import os
          import pathlib
          import sys

          raw_key = os.environ.get("RAW_TAURI_SIGNING_PRIVATE_KEY", "").strip()
          if not raw_key:
              print("FEHLER: GitHub Secret TAURI_SIGNING_PRIVATE_KEY fehlt.")
              sys.exit(1)

          normalized = (
              raw_key
              .replace("\r\n", "\n")
              .replace("\r", "\n")
              .strip()
          )
          if "\\n" in normalized or "\\r" in normalized:
              normalized = (
                  normalized
                  .replace("\\r\\n", "\n")
                  .replace("\\n", "\n")
                  .replace("\\r", "\n")
              )

          key_blob = normalized
          lines = [line.strip() for line in key_blob.split("\n") if line.strip()]
          if len(lines) == 1:
              try:
                  decoded = base64.b64decode(lines[0]).decode("utf-8").strip()
                  decoded_lines = [line.strip() for line in decoded.split("\n") if line.strip()]
                  if len(decoded_lines) >= 2:
                      lines = decoded_lines
              except (binascii.Error, UnicodeDecodeError):
                  pass
          else:
              key_blob = base64.b64encode(normalized.encode("utf-8")).decode("ascii")

          if len(lines) < 2 or "secret key" not in lines[0].lower():
              print(
                  "FEHLER: TAURI_SIGNING_PRIVATE_KEY ist nicht im erwarteten minisign-Format. "
                  "Erwartet wird entweder der rohe Inhalt der generierten .key-Datei oder "
                  "dekodiertes minisign-Key-Material mit Kommentar- und Key-Zeile."
              )
              sys.exit(1)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write("TAURI_SIGNING_PRIVATE_KEY<<EOF\n")
              env_file.write(key_blob.strip())
              env_file.write("\nEOF\n")
              password = os.environ.get("RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD", "")
              if password:
                  env_file.write("TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF\n")
                  env_file.write(password)
                  env_file.write("\nEOF\n")
          print("Tauri signing key prepared in GITHUB_ENV")

      # tauri-action erstellt den Release selbst und lädt alle Installer hoch
      # updaterJsonPreferNsis=true → NSIS-Bundle (.nsis.zip) für Windows-Updates bevorzugen
      - name: Tauri Desktop-App bauen & Release befüllen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Singra Vox ${{ github.ref_name }}"
          releaseBody: |
            ## Singra Vox ${{ github.ref_name }}

            ### Download
            | Plattform | Datei |
            |-----------|-------|
            | Windows   | `Singra.Vox_*_x64-setup.exe` oder `.msi` |
            | Linux     | `singra-vox_*_amd64.deb` oder `.AppImage` |
            | macOS     | `Singra.Vox_*_aarch64.dmg` |

            ### Selfhosting
            Server-Images: `ghcr.io/einmalmaik/singra-vox/backend` und `/web`
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

  # ── Server Docker-Images bauen & zu GHCR pushen ──────────────────────────
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Version extrahieren
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Backend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: deploy/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}

      - name: Frontend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: deploy/frontend.Dockerfile
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}

  # ── Draft-Release veröffentlichen (sobald alle Desktop-Builds fertig sind) ──
  publish-release:
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Release veröffentlichen (Draft → Öffentlich)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
