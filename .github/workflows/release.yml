name: Singra Vox Release

# ── Auslöser ──────────────────────────────────────────────────────────────────
# Wird ausgeführt wenn ein Tag wie v1.0.0 gepusht wird
# Beispiel:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*.*.*"

env:
  # Wird von tauri-action für signierte Updates benötigt
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # ── Schritt 1: Release erstellen ─────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: GitHub Release erstellen
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Schritt 2: Desktop-Apps bauen (alle 3 Plattformen) ───────────────────────
  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: .msi + .exe (NSIS)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          # Linux: .deb + .AppImage
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workdir: desktop/src-tauri

      # Linux: System-Abhängigkeiten
      - name: Linux-Abhängigkeiten
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libxdo-dev \
            libxcb-composite0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libx11-dev \
            pkg-config

      # macOS: Notarisierung konfigurieren (optional, nur wenn Certs vorhanden)
      - name: macOS Signing einrichten
        if: startsWith(matrix.os, 'macos') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security default-keychain -s build.keychain

      - name: Frontend-Abhängigkeiten installieren
        run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Desktop npm-Abhängigkeiten installieren
        run: yarn install --frozen-lockfile
        working-directory: desktop

      # ── Tauri bauen ────────────────────────────────────────────────────────
      - name: Tauri Desktop-App bauen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Notarisierung (optional)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # ── Schritt 3: Server-Docker-Images bauen + pushen ───────────────────────────
  build-server:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Version extrahieren
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Backend-Image bauen + pushen
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: deploy/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}

      - name: Frontend-Image bauen + pushen
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: deploy/frontend.Dockerfile
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}

  # ── Schritt 4: update.json für Tauri Updater erstellen ──────────────────────
  publish-updater:
    needs: [create-release, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Release veröffentlichen (Draft → Veröffentlicht)
        uses: softprops/action-gh-release@v2
        with:
          release_id: ${{ needs.create-release.outputs.release_id }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
