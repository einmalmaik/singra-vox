name: Singra Vox Release

# Wird ausgelöst wenn ein Tag wie v1.0.0 gepusht wird
# Beispiel:  git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Desktop-Apps bauen (Windows, Linux, macOS) ────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workdir: desktop/src-tauri

      - name: Linux-Systemabhängigkeiten
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            pkg-config

      - name: Frontend-Abhängigkeiten installieren
        run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Desktop-Abhängigkeiten installieren
        run: yarn install --frozen-lockfile
        working-directory: desktop

      # tauri-action erstellt den Release selbst und lädt alle Installer hoch
      - name: Tauri Desktop-App bauen & Release befüllen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Singra Vox ${{ github.ref_name }}"
          releaseBody: |
            ## Singra Vox ${{ github.ref_name }}

            ### Download
            | Plattform | Datei |
            |-----------|-------|
            | Windows   | `Singra.Vox_*_x64-setup.exe` oder `.msi` |
            | Linux     | `singra-vox_*_amd64.deb` oder `.AppImage` |
            | macOS     | `Singra.Vox_*_aarch64.dmg` |

            ### Selfhosting
            Server-Images: `ghcr.io/einmalmaik/singra-vox/backend` und `/web`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  # ── Server Docker-Images bauen & zu GHCR pushen ──────────────────────────
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Version extrahieren
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Backend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: deploy/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}

      - name: Frontend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: deploy/frontend.Dockerfile
          push: true
          build-args: |
            REACT_APP_BACKEND_URL=
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}

  # ── Draft-Release veröffentlichen (sobald alle Desktop-Builds fertig sind) ──
  publish-release:
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Release veröffentlichen (Draft → Öffentlich)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
